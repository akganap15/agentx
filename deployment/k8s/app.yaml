---
# ============================================================
# SMB-in-a-Box / T-CHai  — Kubernetes Application Manifest
# Includes: Deployment, Service, HorizontalPodAutoscaler
# ============================================================

apiVersion: apps/v1
kind: Deployment
metadata:
  name: tchai-api
  namespace: tchai
  labels:
    app: tchai-api
    version: "0.1.0"
    team: tchai-hackathon
spec:
  replicas: 2
  selector:
    matchLabels:
      app: tchai-api
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: tchai-api
        version: "0.1.0"
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/metrics"
        prometheus.io/port: "8000"
    spec:
      serviceAccountName: tchai-api
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: api
          image: tchai-api:0.1.0   # Replace with your registry path
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
              name: http
              protocol: TCP
          envFrom:
            - configMapRef:
                name: tchai-config
            - secretRef:
                name: tchai-secrets
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 20
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: tchai-api

---
apiVersion: v1
kind: Service
metadata:
  name: tchai-api
  namespace: tchai
  labels:
    app: tchai-api
spec:
  selector:
    app: tchai-api
  ports:
    - name: http
      port: 80
      targetPort: 8000
      protocol: TCP
  type: ClusterIP

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: tchai-api-hpa
  namespace: tchai
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: tchai-api
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 75

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: tchai-api
  namespace: tchai
  labels:
    app: tchai-api

---
# Ingress (assumes nginx ingress controller is installed)
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: tchai-api
  namespace: tchai
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - api.smbinabox.example.com
      secretName: tchai-tls
  rules:
    - host: api.smbinabox.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: tchai-api
                port:
                  name: http
