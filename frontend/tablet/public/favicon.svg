<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Rounded square background -->
  <rect width="64" height="64" rx="14" fill="#E20074"/>

  <!-- Subtle inner gradient overlay -->
  <rect width="64" height="64" rx="14" fill="url(#grad)" opacity="0.4"/>

  <!-- T lettermark -->
  <rect x="14" y="17" width="36" height="7" rx="3.5" fill="white"/>
  <rect x="28.5" y="22" width="7" height="26" rx="3.5" fill="white"/>

  <!-- AI spark dot (bottom-right corner accent) -->
  <circle cx="50" cy="50" r="7" fill="#1a0010"/>
  <circle cx="50" cy="50" r="4" fill="#E20074"/>
  <circle cx="50" cy="50" r="2" fill="white"/>

  <defs>
    <radialGradient id="grad" cx="30%" cy="25%" r="70%">
      <stop offset="0%" stop-color="white" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="black" stop-opacity="0.15"/>
    </radialGradient>
  </defs>
</svg>
